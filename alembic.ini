# Alembic config for cloud-mode schema migrations.
# The boot path uses create_all (see cloud/database.init_engine); Alembic is here
# for controlled migrations once the schema needs to evolve.
# Usage: DATABASE_URL=... alembic revision --autogenerate -m "msg" && alembic upgrade head
[alembic]
script_location = alembic
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
