services:
  backend:
    build: ./backend
    container_name: openshorts-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./assets:/app/assets:ro
      - /app/__pycache__
      - ./output:/app/output
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: openshorts-frontend
    ports:
      - "5175:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend

  renderer:
    build:
      context: .
      dockerfile: renderer/service/Dockerfile
    container_name: openshorts-renderer
    ports:
      - "3100:3100"
    volumes:
      - ./output:/output
    environment:
      - REMOTION_BUNDLE_PATH=/app/remotion
      - OUTPUT_DIR=/output
      - PORT=3100
    restart: unless-stopped
    depends_on:
      - backend
