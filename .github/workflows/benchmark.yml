name: Benchmark
on:
  pull_request:
    branches: [main]
jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run benchmark || true

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench.json